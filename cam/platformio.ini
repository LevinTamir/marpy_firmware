; PlatformIO Project Configuration File
;
; MARPY vision firmware for the AI-Thinker ESP32-CAM. Streams JPEG frames
; over micro-ROS to the same agent the base firmware talks to.

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

upload_protocol = esptool
upload_port  = /dev/ttyUSB0
upload_speed = 921600
monitor_port = /dev/ttyUSB0
monitor_speed = 115200

; The camera driver plus micro-ROS overflow the default 1.2 MB app partition.
board_build.partitions = huge_app.csv

build_flags =
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DCAMERA_MODEL_AI_THINKER

lib_deps =
  https://github.com/micro-ROS/micro_ros_platformio
  espressif/esp32-camera

board_microros_distro = jazzy
board_microros_transport = wifi
; Override XRCE-DDS sizing (bigger MTU, tuned stream history) for image payloads.
board_microros_user_meta = colcon.meta
