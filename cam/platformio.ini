; PlatformIO Project Configuration File
;
; MARPY vision firmware for the AI-Thinker ESP32-CAM. Serves an MJPEG
; stream at http://marpy-cam.local/stream; a ROS 2 bridge node on the PC
; turns it into sensor_msgs/Image.

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

upload_protocol = esptool
upload_port  = /dev/ttyUSB0
upload_speed = 921600
monitor_port = /dev/ttyUSB0
monitor_speed = 115200

; The camera driver still wants a roomy app partition.
board_build.partitions = huge_app.csv

build_flags =
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DCAMERA_MODEL_AI_THINKER

lib_deps =
  espressif/esp32-camera
